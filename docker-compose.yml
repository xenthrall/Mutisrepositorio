services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-os:latest
    container_name: erp_app
    restart: always
    volumes:
      - ./.env:/var/www/html/.env
      - erp_data:/var/www/html/storage
      - ./docker/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - erp-network

  nginx:
    image: nginx:alpine
    container_name: erp_nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html:ro
      - erp_data:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - erp-network

  mysql:
    image: mysql:8.0
    container_name: erp_mysql
    restart: always
    environment:
      MYSQL_DATABASE: erp_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-os:latest
    container_name: erp_queue
    restart: always
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=3 --max-time=3600
    volumes:
      - ./.env:/var/www/html/.env
      - erp_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - erp-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-os:latest
    container_name: erp_scheduler
    restart: always
    init: true
    command: php artisan schedule:work
    volumes:
      - ./.env:/var/www/html/.env
      - erp_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  db_data:
  erp_data: